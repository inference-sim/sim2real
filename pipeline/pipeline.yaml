apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sim2real
spec:
  params:
    - name: experimentId
      type: string
    - name: runName
      type: string
    - name: namespace
      type: string
    - name: phase
      type: string
    - name: scenarioContent
      type: string
    - name: specContent
      type: string
    - name: workloadName
      type: string
    - name: workloadSpec
      type: string
    - name: benchmarkGitRepoUrl
      type: string
    - name: benchmarkGitCommit
      type: string
    - name: blisGitRepoUrl
      type: string
    - name: blisGitCommit
      type: string
    - name: model
      type: string
    - name: skipTeardown
      type: string
      default: "false"
    - name: maxConcurrency
      type: string
      default: "10000"
    - name: timeout
      type: string
      default: "1800"
    - name: warmupRequests
      type: string
      default: "50"
    - name: prewarmDuration
      type: string
      default: "60s"
    - name: extraArgs
      type: string
      default: ""
    - name: replica
      type: string
      default: "1"
  workspaces:
    - name: source
    - name: data-storage
  tasks:
    - name: install-llmdbenchmark
      retries: 2
      taskRef:
        name: install-llmdbenchmark
      workspaces:
        - name: source
          workspace: source
      params:
        - name: git_repo_url
          value: "$(params.benchmarkGitRepoUrl)"
        - name: git_commit
          value: "$(params.benchmarkGitCommit)"

    - name: install-blis
      taskRef:
        name: install-blis
      workspaces:
        - name: source
          workspace: source
      params:
        - name: git_repo_url
          value: "$(params.blisGitRepoUrl)"
        - name: git_commit
          value: "$(params.blisGitCommit)"

    - name: llmdbenchmark-standup
      runAfter: ["install-llmdbenchmark"]
      taskRef:
        name: llmdbenchmark-standup
      workspaces:
        - name: source
          workspace: source
        - name: data
          workspace: data-storage
      params:
        - name: namespace
          value: "$(params.namespace)"
        - name: scenario_content
          value: "$(params.scenarioContent)"
        - name: spec_content
          value: "$(params.specContent)"
        - name: plans_dir
          value: "$(params.runName)/plans/$(params.phase)/$(params.workloadName)"
        - name: smoketest_delay
          value: "30"

    - name: prepare-results-dir
      taskRef:
        name: prepare-results-dir
      workspaces:
        - name: data
          workspace: data-storage
      params:
        - name: resultsDir
          value: "$(params.runName)/$(params.phase)/$(params.workloadName)/i$(params.replica)"

    - name: stream-epp-logs
      runAfter: ["llmdbenchmark-standup", "prepare-results-dir"]
      taskRef:
        name: stream-epp-logs
      workspaces:
        - name: data
          workspace: data-storage
      params:
        - name: namespace
          value: "$(params.namespace)"
        - name: resultsDir
          value: "$(params.runName)/$(params.phase)/$(params.workloadName)/i$(params.replica)"

    - name: stream-gpu-stats
      runAfter: ["llmdbenchmark-standup", "prepare-results-dir"]
      taskRef:
        name: stream-gpu-stats
      workspaces:
        - name: data
          workspace: data-storage
      params:
        - name: namespace
          value: "$(params.namespace)"
        - name: resultsDir
          value: "$(params.runName)/$(params.phase)/$(params.workloadName)/i$(params.replica)"

    - name: stream-metrics
      runAfter: ["llmdbenchmark-standup", "prepare-results-dir"]
      taskRef:
        name: stream-metrics
      workspaces:
        - name: data
          workspace: data-storage
      params:
        - name: namespace
          value: "$(params.namespace)"
        - name: resultsDir
          value: "$(params.runName)/$(params.phase)/$(params.workloadName)/i$(params.replica)"
        # Pin collect_metrics.sh + process_metrics.py to the SHA sim2real
        # currently vendors in its llm-d-benchmark submodule. The value
        # flows in from the pipeline-level ``benchmarkGitCommit`` param,
        # which ``sim2real assemble`` fills from
        # ``discover_framework_submodules()['llm-d-benchmark']`` on every
        # PipelineRun (see pipeline/lib/assemble_run.py). Same rail
        # install-llmdbenchmark rides above at line ~69 — bumping the
        # submodule pointer automatically re-pins the scraper without a
        # manual edit here.
        - name: harnessSha
          value: "$(params.benchmarkGitCommit)"

    - name: run-workload-blis-observe-binary
      runAfter: ["llmdbenchmark-standup", "install-blis", "prepare-results-dir"]
      taskRef:
        name: run-workload-blis-observe-binary
      workspaces:
        - name: source
          workspace: source
        - name: data
          workspace: data-storage
      params:
        - name: model
          value: "$(params.model)"
        - name: endpoint
          value: "$(tasks.llmdbenchmark-standup.results.endpoint)"
        - name: workloadSpec
          value: "$(params.workloadSpec)"
        - name: resultsDir
          value: "$(params.runName)/$(params.phase)/$(params.workloadName)/i$(params.replica)"
        - name: maxConcurrency
          value: "$(params.maxConcurrency)"
        - name: timeout
          value: "$(params.timeout)"
        - name: warmupRequests
          value: "$(params.warmupRequests)"
        - name: prewarmDuration
          value: "$(params.prewarmDuration)"
        - name: extraArgs
          value: "$(params.extraArgs)"

    - name: collect-results
      runAfter: ["run-workload-blis-observe-binary"]
      taskRef:
        name: collect-results
      workspaces:
        - name: data
          workspace: data-storage
      params:
        - name: resultsDir
          value: "$(params.runName)/$(params.phase)/$(params.workloadName)/i$(params.replica)"
        - name: namespace
          value: "$(params.namespace)"

  finally:
    - name: llmdbenchmark-teardown
      when:
        - input: "$(params.skipTeardown)"
          operator: notin
          values: ["true"]
      taskRef:
        name: llmdbenchmark-teardown
      workspaces:
        - name: source
          workspace: source
      params:
        - name: namespace
          value: "$(params.namespace)"
        - name: scenario_content
          value: "$(params.scenarioContent)"
        - name: spec_content
          value: "$(params.specContent)"
