# workspace/tekton/values.yaml
# Generated by Stage 3 (generate.md Step 8) — sim2real transfer pipeline
# Algorithm: blis_weighted_scoring
# inference-sim tag: v0.6.13
# Source: blis_router/llm_config.yaml, docs/transfer/blis_to_llmd_mapping.md

stack:
  gateway:
    helmValues:
      gateway:
        # Source: https://github.com/llm-d/llm-d/blob/main/guides/prereq/gateway-provider/common-configurations/istio.yaml
        provider: istio
        gatewayClassName: istio
        gatewayParameters:
          resources:
            limits:
              cpu: "16"
              memory: 16Gi
            requests:
              cpu: "4"
              memory: 4Gi
          istio:
            accessLogging: false  # default false for production

  model:
    # modelName: required by pipeline templates via {{ stack.model.modelName }}
    # Source: blis_router/llm_config.yaml model.hf_repo
    modelName: Qwen/Qwen2.5-7B-Instruct

    helmValues:

      modelArtifacts:
        name: Qwen/Qwen2.5-7B-Instruct
        uri: pvc://model-pvc/models/Qwen2.5-7B-Instruct
        authSecretName: "hf-secret"

      routing:
        servicePort: 8000

      prefill:
        create: false

      decode:
        # cluster.num_instances = 4
        replicas: 4
        parallelism:
          # serving.tensor_parallelism = 1
          tensor: 1
        acceleratorTypes:
          labelKey: "nvidia.com/gpu.product"
          # hardware.gpu = H100 → NVIDIA-H100-80GB-HBM3
          labelValues:
            - "NVIDIA-H100-80GB-HBM3"
        containers:
          - image: "vllm/vllm-openai:v0.11.0"
            modelCommand: vllmServe
            extraConfig:
              vllm:
                # serving.gpu_memory_utilization = 0.90
                gpuMemoryUtilization: 0.90
                # vllm_config.max_num_running_reqs = 256
                maxNumSeqs: 256
                # vllm_config.max_num_scheduled_tokens = 2048
                maxNumBatchedTokens: 2048

  gaie:
    # Per-phase helm values for oci://registry.k8s.io/gateway-api-inference-extension/charts/inferencepool
    # Passed as `config` to the deploy-gaie Tekton task via {{ stack.gaie.<phase>.helmValues | tojson }}.
    # Common fields (provider, istio connection pool, flags) are duplicated per phase because
    # pluginsCustomConfig differs between phases.
    # Source for connection pool defaults:
    #   https://github.com/llm-d/llm-d/blob/main/guides/prereq/gateway-provider/common-configurations/istio.yaml

    # Baseline: existing load-aware scheduler (production default)
    baseline:
      helmValues:
        inferenceExtension:
          pluginsConfigFile: "custom-plugins.yaml"
          pluginsCustomConfig:
            custom-plugins.yaml: |
              apiVersion: inference.networking.x-k8s.io/v1alpha1
              kind: EndpointPickerConfig
              plugins:
              - type: load-aware-scorer
              - type: decode-filter
              - type: max-score-picker
              - type: single-profile-handler
              schedulingProfiles:
              - name: default
                plugins:
                - pluginRef: decode-filter
                - pluginRef: max-score-picker
                - pluginRef: load-aware-scorer
                  weight: 1
          flags:
            - name: v
              value: 1
        provider:
          name: istio
        istio:
          # Source: https://github.com/llm-d/llm-d/blob/main/guides/prereq/gateway-provider/common-configurations/istio.yaml
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: "900s"
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: "1800s"
                  connectTimeout: "900s"

    # Treatment: BLIS-evolved weighted scorer
    # Generated scorer type: blis-weighted-scorer (scorer_type from stage3_output.json)
    treatment:
      helmValues:
        inferenceExtension:
          pluginsConfigFile: "custom-plugins.yaml"
          pluginsCustomConfig:
            custom-plugins.yaml: |
              apiVersion: inference.networking.x-k8s.io/v1alpha1
              kind: EndpointPickerConfig
              plugins:
              - type: blis-weighted-scorer
                parameters: {enabled: true}
              - type: decode-filter
              - type: max-score-picker
              - type: single-profile-handler
              schedulingProfiles:
              - name: default
                plugins:
                - pluginRef: decode-filter
                - pluginRef: max-score-picker
                - pluginRef: blis-weighted-scorer
                  weight: 1
          flags:
            - name: v
              value: 1
        provider:
          name: istio
        istio:
          # Source: https://github.com/llm-d/llm-d/blob/main/guides/prereq/gateway-provider/common-configurations/istio.yaml
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: "900s"
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: "1800s"
                  connectTimeout: "900s"

observe:
  # inference-sim container image for BLIS noise/baseline/treatment runs
  # Tag resolved from: cd inference-sim && git describe --tags
  image: "ghcr.io/inference-sim/blis:v0.6.13"

  # Number of noise runs for variance estimation (Stage 5 validate.md)
  noise_runs: 5

  # Workloads to exercise during benchmarking
  # Source: blis_router/workloads/workload_*.yaml
  # Note: second workload removed — KV cache contamination risk (single workload only)
  workloads:
    - name: glia-prefix-heavy
      source: blis_router/workloads/workload_glia_prefix_heavy.yaml
      spec: |
        version: "1"
        seed: 42
        category: language
        aggregate_rate: 85.0
        num_requests: 1500

        clients:
          - id: "dominant-batch"
            slo_class: "batch"
            rate_fraction: 0.45
            streaming: false
            arrival:
              process: gamma
              cv: 6.0
            input_distribution:
              type: gaussian
              params:
                mean: 200
                std_dev: 80
                min: 25
                max: 500
            output_distribution:
              type: gaussian
              params:
                mean: 100
                std_dev: 45
                min: 10
                max: 300
            prefix_group: "group-dominant"
            prefix_length: 14336

          - id: "secondary-interactive"
            slo_class: "interactive"
            rate_fraction: 0.18
            streaming: true
            arrival:
              process: gamma
              cv: 4.0
            input_distribution:
              type: gaussian
              params:
                mean: 140
                std_dev: 55
                min: 15
                max: 380
            output_distribution:
              type: gaussian
              params:
                mean: 70
                std_dev: 30
                min: 10
                max: 220
            prefix_group: "group-secondary"
            prefix_length: 14336

          - id: "group-c"
            slo_class: "interactive"
            rate_fraction: 0.12
            streaming: true
            arrival:
              process: gamma
              cv: 4.0
            input_distribution:
              type: gaussian
              params:
                mean: 110
                std_dev: 45
                min: 10
                max: 320
            output_distribution:
              type: gaussian
              params:
                mean: 60
                std_dev: 28
                min: 8
                max: 200
            prefix_group: "group-c"
            prefix_length: 14336

          - id: "group-d"
            slo_class: "interactive"
            rate_fraction: 0.10
            streaming: true
            arrival:
              process: gamma
              cv: 4.0
            input_distribution:
              type: gaussian
              params:
                mean: 120
                std_dev: 50
                min: 10
                max: 330
            output_distribution:
              type: gaussian
              params:
                mean: 55
                std_dev: 25
                min: 8
                max: 180
            prefix_group: "group-d"
            prefix_length: 14336

          - id: "realtime-e"
            slo_class: "realtime"
            rate_fraction: 0.08
            streaming: true
            arrival:
              process: poisson
            input_distribution:
              type: gaussian
              params:
                mean: 80
                std_dev: 30
                min: 10
                max: 200
            output_distribution:
              type: gaussian
              params:
                mean: 35
                std_dev: 18
                min: 5
                max: 110
            prefix_group: "group-e"
            prefix_length: 14336

          - id: "no-prefix-f"
            slo_class: "realtime"
            rate_fraction: 0.07
            streaming: true
            arrival:
              process: gamma
              cv: 5.0
            input_distribution:
              type: gaussian
              params:
                mean: 90
                std_dev: 35
                min: 10
                max: 230
            output_distribution:
              type: gaussian
              params:
                mean: 45
                std_dev: 22
                min: 5
                max: 140
