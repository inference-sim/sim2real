apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sim2real-noise
spec:
  params:
  - name: experimentId
    type: string
  - name: namespace
    type: string
  - name: runIndex
    type: string
  workspaces:
  - name: model-cache
  - name: hf-credentials
  - name: data-storage
  tasks:
  - name: deploy-gateway
    taskRef:
      name: deploy-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        gateway:
          provider: istio
          gatewayClassName: istio
          gatewayParameters:
            resources:
              limits:
                cpu: '16'
                memory: 16Gi
              requests:
                cpu: '4'
                memory: 4Gi
            istio:
              accessLogging: false
  - name: download-model
    taskRef:
      name: download-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    - name: hf-credentials
      workspace: hf-credentials
    params:
    - name: model
      value: Qwen/Qwen2.5-7B-Instruct
  - name: deploy-gaie
    taskRef:
      name: deploy-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: config
      value:
        inferenceExtension:
          pluginsConfigFile: custom-plugins.yaml
          pluginsCustomConfig:
            custom-plugins.yaml: "apiVersion: inference.networking.x-k8s.io/v1alpha1\nkind: EndpointPickerConfig\nplugins:\n- type: load-aware-scorer\n- type: decode-filter\n- type: max-score-picker\n- type: single-profile-handler\nschedulingProfiles:\n- name: default\n  plugins:\n  - pluginRef: decode-filter\n  - pluginRef: max-score-picker\n  - pluginRef: load-aware-scorer\n    weight: 1\n"
          flags:
          - name: v
            value: 1
        provider:
          name: istio
        istio:
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: 900s
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: 1800s
                  connectTimeout: 900s
    - name: namespace
      value: $(params.namespace)
  - name: deploy-model
    runAfter:
    - download-model
    - deploy-gaie
    taskRef:
      name: deploy-model
    workspaces:
    - name: model-cache
      workspace: model-cache
    params:
    - name: model
      value: Qwen/Qwen2.5-7B-Instruct
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
    - name: config
      value:
        modelArtifacts:
          name: Qwen/Qwen2.5-7B-Instruct
          uri: pvc://model-pvc/models/Qwen2.5-7B-Instruct
          authSecretName: hf-secret
        routing:
          servicePort: 8000
        prefill:
          create: false
        decode:
          replicas: 4
          parallelism:
            tensor: 1
          acceleratorTypes:
            labelKey: nvidia.com/gpu.product
            labelValues:
            - NVIDIA-H100-80GB-HBM3
          containers:
          - image: vllm/vllm-openai:v0.11.0
            modelCommand: vllmServe
            extraConfig:
              vllm:
                gpuMemoryUtilization: 0.9
                maxNumSeqs: 256
                maxNumBatchedTokens: 2048
  - name: deploy-httproute
    runAfter:
    - deploy-gateway
    - deploy-gaie
    taskRef:
      name: deploy-httproute
    params:
    - name: namespace
      value: $(params.namespace)
    - name: gateway
      value: $(tasks.deploy-gateway.results.gateway)
    - name: inferencepool
      value: $(tasks.deploy-gaie.results.inferencepool)
    - name: modelLabel
      value: sim2real-$(params.experimentId)
  - name: run-workload-glia-prefix-heavy
    runAfter:
    - deploy-model
    - deploy-httproute
    taskRef:
      name: run-workload-blis-observe
    workspaces:
    - name: data
      workspace: data-storage
    params:
    - name: endpoint
      value: http://$(tasks.deploy-gateway.results.endpoint)/sim2real-$(params.experimentId)
    - name: model
      value: Qwen/Qwen2.5-7B-Instruct
    - name: workloadSpec
      value: "version: \"1\"\nseed: 42\ncategory: language\naggregate_rate: 85.0\nnum_requests: 1500\n\nclients:\n  - id: \"dominant-batch\"\n    slo_class: \"batch\"\n    rate_fraction: 0.45\n    streaming: false\n    arrival:\n      process: gamma\n      cv: 6.0\n    input_distribution:\n      type: gaussian\n      params:\n        mean: 200\n        std_dev: 80\n        min: 25\n        max: 500\n    output_distribution:\n      type: gaussian\n      params:\n        mean: 100\n        std_dev: 45\n        min: 10\n        max: 300\n    prefix_group: \"group-dominant\"\n    prefix_length: 14336\n\n  - id: \"secondary-interactive\"\n    slo_class: \"interactive\"\n    rate_fraction: 0.18\n    streaming: true\n    arrival:\n      process: gamma\n      cv: 4.0\n    input_distribution:\n      type: gaussian\n      params:\n        mean: 140\n        std_dev: 55\n        min: 15\n        max: 380\n    output_distribution:\n      type: gaussian\n      params:\n        mean: 70\n        std_dev: 30\n        min: 10\n        max: 220\n    prefix_group: \"group-secondary\"\n    prefix_length: 14336\n\n  - id: \"group-c\"\n    slo_class: \"interactive\"\n    rate_fraction: 0.12\n    streaming: true\n    arrival:\n      process: gamma\n      cv: 4.0\n    input_distribution:\n      type: gaussian\n      params:\n        mean: 110\n        std_dev: 45\n        min: 10\n        max: 320\n    output_distribution:\n      type: gaussian\n      params:\n        mean: 60\n        std_dev: 28\n        min: 8\n        max: 200\n    prefix_group: \"group-c\"\n    prefix_length: 14336\n\n  - id: \"group-d\"\n    slo_class: \"interactive\"\n    rate_fraction: 0.10\n    streaming: true\n    arrival:\n      process: gamma\n      cv: 4.0\n    input_distribution:\n      type: gaussian\n      params:\n        mean: 120\n        std_dev: 50\n        min: 10\n        max: 330\n    output_distribution:\n      type: gaussian\n      params:\n        mean: 55\n        std_dev: 25\n        min: 8\n        max: 180\n    prefix_group: \"group-d\"\n    prefix_length: 14336\n\n  - id: \"realtime-e\"\n    slo_class: \"realtime\"\n    rate_fraction: 0.08\n    streaming: true\n    arrival:\n      process: poisson\n    input_distribution:\n      type: gaussian\n      params:\n        mean: 80\n        std_dev: 30\n        min: 10\n        max: 200\n    output_distribution:\n      type: gaussian\n      params:\n        mean: 35\n        std_dev: 18\n        min: 5\n        max: 110\n    prefix_group: \"group-e\"\n    prefix_length: 14336\n\n  - id: \"no-prefix-f\"\n    slo_class: \"realtime\"\n    rate_fraction: 0.07\n    streaming: true\n    arrival:\n      process: gamma\n      cv: 5.0\n    input_distribution:\n      type: gaussian\n      params:\n        mean: 90\n        std_dev: 35\n        min: 10\n        max: 230\n    output_distribution:\n      type: gaussian\n      params:\n        mean: 45\n        std_dev: 22\n        min: 5\n        max: 140\n"
    - name: blisImage
      value: ghcr.io/inference-sim/blis:v0.6.13
    - name: resultsDir
      value: noise/glia-prefix-heavy/run-$(params.runIndex)
  - name: collect-results
    runAfter:
    - run-workload-glia-prefix-heavy
    taskRef:
      name: collect-results
    workspaces:
    - name: data
      workspace: data-storage
  finally:
  - name: delete-httproute
    taskRef:
      name: delete-httproute
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-gateway
    taskRef:
      name: delete-gateway
    params:
    - name: experimentId
      value: $(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-model
    taskRef:
      name: delete-model
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
  - name: delete-gaie
    taskRef:
      name: delete-gaie
    params:
    - name: modelLabel
      value: sim2real-$(params.experimentId)
    - name: namespace
      value: $(params.namespace)
