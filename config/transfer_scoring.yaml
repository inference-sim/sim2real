kind: sim2real-transfer
version: 1

# ─── Algorithm Source ────────────────────────────────────────────────────────
algorithm:
  experiment_dir: blis_router
  source: best/best_program.go
  info: best/best_program_info.json
  workloads: workloads/
  llm_config: llm_config.yaml

# ─── Production Target ──────────────────────────────────────────────────────
target:
  repo: llm-d-inference-scheduler
  plugin_dir: pkg/plugins/scorer/
  register_file: pkg/plugins/register.go
  package: scorer
  naming:
    suffix: "-scorer"
  test_commands:
    - ["go", "build", "./..."]
    - ["go", "vet", "./..."]
    - ["go", "test", "-timeout", "10m", "./pkg/plugins/scorer/...", "-v"]
  equivalence_commands:
    - command: ["go", "test", "-tags=suitea", "-json", "-v", "-timeout", "10m", "./pkg/plugins/scorer/..."]
      fatal: true
      name: "Suite A: rank correlation"
    - command: ["go", "test", "-tags=suiteb", "-json", "-v", "-timeout", "10m", "./pkg/plugins/scorer/..."]
      fatal: false
      name: "Suite B: rank stability (informational)"
    - command: ["go", "test", "-tags=suitec", "-json", "-v", "-race", "-timeout", "10m", "./pkg/plugins/scorer/..."]
      fatal: true
      name: "Suite C: determinism + pile-on"

# ─── LLM Context Documents ──────────────────────────────────────────────────
context:
  mapping: docs/transfer/blis_to_llmd_mapping.md
  template: docs/transfer/scorer_template.go.md
  examples:
    - pkg/plugins/scorer/load_aware.go
    - pkg/plugins/scorer/load_aware_test.go
  extra: []

# ─── Helm / Cluster Config ──────────────────────────────────────────────────
config:
  env_defaults: config/env_defaults.yaml
  treatment_config_template: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: {plugin_type}
    - type: decode-filter
    - type: max-score-picker
    - type: single-profile-handler
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: decode-filter
      - pluginRef: max-score-picker
      - pluginRef: {plugin_type}
        weight: 1
  helm_path: gaie.treatment.helmValues.inferenceExtension.pluginsCustomConfig.custom-plugins.yaml

# ─── Validation ──────────────────────────────────────────────────────────────
validation:
  mode: latency_comparison
  metrics:
    - ttft
    - tpot
    - e2e_latency

# ─── Artifact Naming ─────────────────────────────────────────────────────────
artifacts:
  plugin_snapshot: prepare_plugin.go
  plugin_test_snapshot: prepare_plugin_test.go
