stack:
  gateway:
    helmValues:
      gateway:
        provider: istio
        gatewayClassName: istio
        gatewayParameters:
          resources:
            limits:
              cpu: '16'
              memory: 16Gi
            requests:
              cpu: '4'
              memory: 4Gi
          istio:
            accessLogging: false
  model:
    vllm_image: ghcr.io/llm-d/llm-d-cuda:v0.5.1
    helmValues:
      modelArtifacts:
        authSecretName: hf-secret
      routing:
        servicePort: 8000
      prefill:
        create: false
      decode:
        create: true
        acceleratorTypes:
          labelKey: nvidia.com/gpu.product
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                  - pokprod-b93r39s0
        containers:
        - modelCommand: vllmServe
          mountModelVolume: true
  gaie:
    epp_image:
      upstream:
        hub: ghcr.io/llm-d
        name: llm-d-inference-scheduler
        tag: latest
        pullPolicy: IfNotPresent
      build:
        hub: quay.io/jgchen
        name: blis-inference-scheduler
        tag: sim2real-test5
        platform: linux/amd64
        pullPolicy: Always
    shared:
      helmValues:
        inferenceExtension:
          pluginsConfigFile: custom-plugins.yaml
          flags:
            v: 1
        provider:
          name: istio
        istio:
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: 900s
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: 1800s
                  connectTimeout: 900s
    baseline:
      helmValues:
        inferenceExtension:
          pluginsCustomConfig:
            custom-plugins.yaml: "apiVersion: inference.networking.x-k8s.io/v1alpha1\n\
              kind: EndpointPickerConfig\nplugins:\n- type: load-aware-scorer\n- type:\
              \ decode-filter\n- type: max-score-picker\n- type: single-profile-handler\n\
              schedulingProfiles:\n- name: default\n  plugins:\n  - pluginRef: decode-filter\n\
              \  - pluginRef: max-score-picker\n  - pluginRef: load-aware-scorer\n\
              \    weight: 1\n"
observe:
  noise_runs: 5
  request_multiplier: 10
pipeline:
  fast_iteration: true
  sleepDuration: 30s
