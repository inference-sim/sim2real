kind: sim2real-transfer
version: 1

# ─── Algorithm Source ────────────────────────────────────────────────────────
algorithm:
  experiment_dir: admission_by60
  source: best/best_program.go
  info: best/best_program_info.json
  baseline: baselines/baseline_always_admit.go
  workloads: workloads/
  llm_config: llm_config.yaml
  extras:
    - others/evaluator.py
    - others/calibration.json
    - routing_config/routing_policy.yaml

# ─── Production Target ──────────────────────────────────────────────────────
target:
  repo: llm-d-inference-scheduler
  plugin_dir: pkg/plugins/admission/
  register_file: pkg/plugins/register.go
  package: admission
  naming:
    suffix: "-admission-policy"
  test_commands:
    - ["go", "build", "./..."]
    - ["go", "vet", "./..."]
    - ["go", "test", "-timeout", "10m", "./pkg/plugins/admission/...", "-v"]
  equivalence_commands:
    - command: ["go", "test", "-tags=admission_equiv", "-json", "-v",
                "-timeout", "10m", "./pkg/plugins/admission/..."]
      fatal: true
      name: "Admission decision agreement"

# ─── LLM Context Documents ──────────────────────────────────────────────────
# NOTE: These files must be created before running the pipeline.
#   - docs/transfer/blis_to_llmd_admission_mapping.md
#   - docs/transfer/admission_template.go.md
context:
  mapping: docs/transfer/blis_to_llmd_admission_mapping.md
  template: docs/transfer/admission_template.go.md
  examples: []
  extra:
    - admission_by60/baselines/baseline_always_admit.go

# ─── Helm / Cluster Config ──────────────────────────────────────────────────
config:
  env_defaults: config/env_defaults.yaml
  treatment_config_template: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: AdmissionPolicyConfig
    policies:
    - type: {plugin_type}
  helm_path: gaie.treatment.admissionPolicy
  baseline_config_template: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: AdmissionPolicyConfig
    policies:
    - type: always-admit

# ─── Validation ──────────────────────────────────────────────────────────────
validation:
  mode: custom_evaluator
  evaluator: others/evaluator.py
  metrics:
    - slo_attainment
    - capped_throughput
    - jain_fairness

# ─── Artifact Naming ─────────────────────────────────────────────────────────
artifacts:
  plugin_snapshot: prepare_plugin.go
  plugin_test_snapshot: prepare_plugin_test.go
