# W1c: Under-capacity baseline — Qwen3-14B on 4x H100 TP=1
#
# Rate=35 → ~0.51x capacity. Well under capacity — matches the effective QPS
# from the Apr 15 deployment (concurrency-limited). No shedding expected from
# either baseline or treatment. Use to validate latency parity with prior run.
# Tier mix: critical 20%, standard 30%, sheddable 45%, batch 5%

version: "2"
seed: 42
category: language
aggregate_rate: 35
num_requests: 6300

clients:
  - id: "critical"
    slo_class: "critical"
    rate_fraction: 0.20
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
  - id: "standard"
    slo_class: "standard"
    rate_fraction: 0.30
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
  - id: "sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
  - id: "batch"
    slo_class: "batch"
    rate_fraction: 0.05
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
