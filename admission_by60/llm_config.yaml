# LLM Configuration for Sim2Real Transfer — admission_by60
# All values from BLIS defaults.yaml — trained on real vLLM traces

model:
  id: qwen/qwen3-32b
  hf_repo: Qwen/Qwen3-32B

hardware:
  gpu: H100
  memory_gib: 80.0
  tflops_peak: 989.5
  bw_peak_tbs: 3.35

serving:
  tensor_parallelism: 1
  vllm_version: vllm/vllm-openai:v0.11.0

# vLLM-equivalent parameters (from BLIS defaults.yaml, measured on real vLLM)
vllm_config:
  total_kv_blocks: 67659          # Measured from real vLLM on H100 TP=1
  block_size_in_tokens: 64        # Match EPP precise-prefix-cache-scorer tokenProcessorConfig.blockSize
  max_num_running_reqs: 256       # vLLM default (max concurrent requests in batch)
  max_num_scheduled_tokens: 2048  # Chunked prefill threshold
  max_model_len: 36000                # Unlimited (model's native context window)
  gpu_memory_utilization: 0.95    # Typical vLLM default
  kv_events_config: |-
    {
      "enable_kv_cache_events": true,
      "publisher": "zmq",
      "endpoint": "tcp://$(GAIE_RELEASE_NAME_POSTFIX)-gaie-epp.$(NAMESPACE).svc.cluster.local:5557",
      "topic": "kv@$(POD_IP):8000@Qwen/Qwen3-32B"
    }

# Latency model: blackbox (trained alpha/beta regression on real vLLM traces)
latency_model:
  type: blackbox
  alpha_coeffs: [4680.303204056608, 0.0, 0.0]
  beta_coeffs: [7051.796874715078, 19.538416565504026, 25.431830886933543]
  best_loss: 489.87  # Regression fit quality (lower = better)

cluster:
  num_instances: 4
  snapshot_refresh_interval_us: 5000000  # 5 seconds (Prometheus scrape cycle)
  seeds: [42, 456]                        # Two seeds used in training (vs [42] in admission_old)

# Search config (for reference)
search:
  framework: openevolve
  iterations: 30
  models:
    - name: aws/claude-sonnet-4-5
      weight: 0.7
    - name: aws/claude-opus-4-5
      weight: 0.3
  temperature: 1.0
  max_tokens: 32000

# To deploy on real llm-d:
#   python -m vllm.entrypoints.openai.api_server \
#     --model Qwen/Qwen2.5-7B-Instruct \
#     --tensor-parallel-size 1 \
#     --gpu-memory-utilization 0.90 \
#     --block-size 16 \
#     --max-num-seqs 256 \
#     --max-num-batched-tokens 2048 \
#     --port 800X
